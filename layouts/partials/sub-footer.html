<div class="sub-footer">
  <div class="container">
    <div class="row">
      <div class="col-12">
        <div class="sub-footer-inner">
          <ul>
            {{ if .Site.Data.contact.phone }}
            <li><strong>Phone: </strong>{{ .Site.Data.contact.phone }}</li>
            {{ end }}
            {{ if .Site.Data.contact.email }}
            <li><strong>Email: </strong><a href="mailto:{{ .Site.Data.contact.email }}">
                {{ .Site.Data.contact.email }}</a></li>
              {{ end }}
          </ul>
          <ul>
            <li class="zerostatic">Made by <a href="https://damico.ing" target="_blank">Emanuele D'Amico</a> for <a href="https://www.spin.cnr.it" target="_blank">CNR-SPIN</a>, using a theme by <a href="https://www.zerostatic.io" target="_blank">Zerostatic</a> (MIT license)</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>
